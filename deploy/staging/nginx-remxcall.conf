# Staging: single EC2, no custom domain yet.
# - Port 80  → marketing site (website/dist)
# - Port 8080 → dashboard SPA (client/dist) + reverse proxy to API on :5000
#
# Install: sudo cp nginx-remxcall.conf /etc/nginx/conf.d/remxcall.conf
# Test: sudo nginx -t && sudo systemctl reload nginx
#
# SELinux (Alma/RHEL): allow nginx → Node and static files:
#   sudo setsebool -P httpd_can_network_connect 1
#   sudo chcon -Rt httpd_sys_content_t /var/www/remxcall

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Marketing site
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/remxcall/website;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Dashboard + API proxy (same browser origin for /v1 and Socket.IO)
server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /var/www/remxcall/client;
    index index.html;

    location /v1/ {
        proxy_pass http://127.0.0.1:5000/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:5000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:5000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
